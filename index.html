<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>EchoNode One-File</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#0a0c12;
      --bg2:#0f131b;
      --panel:#151a26;
      --panel2:#1b2230;
      --panel3:#0d1017;
      --line:#2a3246;
      --text:#f6f8ff;
      --muted:#9aa5bc;
      --brand:#6b16ff;
      --brand2:#8b4dff;
      --ok:#4ade80;
      --warn:#f59e0b;
      --busy:#ef4444;
      --off:#6b7280;
      --shadow:0 20px 60px rgba(0,0,0,.38);
    }
    html,body{
      margin:0; min-height:100%;
      background:
        radial-gradient(circle at top left, rgba(107,22,255,.16), transparent 24%),
        radial-gradient(circle at top right, rgba(0,184,255,.08), transparent 22%),
        linear-gradient(180deg,#0b0d14,#090b11 60%,#08090f);
      color:var(--text);
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }
    body{min-height:100vh}
    #app{min-height:100vh}
    .hidden{display:none!important}

    .auth{
      min-height:100vh; width:min(460px,100%); margin:0 auto;
      display:flex; flex-direction:column; justify-content:space-between;
      padding:24px 20px 36px;
    }
    .welcome-top{padding-top:56px; text-align:center}
    .logo{
      width:88px; height:88px; border-radius:28px; margin:0 auto 18px;
      display:flex; align-items:center; justify-content:center;
      font-size:34px; font-weight:900; letter-spacing:-2px;
      background:linear-gradient(135deg,var(--brand),#7b5cff 55%,#a05aff);
      box-shadow:0 16px 34px rgba(88,101,242,.28);
    }
    .auth h1{font-size:36px; line-height:1; letter-spacing:-1.8px; margin:0 0 14px}
    .auth p{margin:0 auto; max-width:320px; color:#eef1ff; opacity:.93; line-height:1.5}
    .auth-card{
      background:rgba(17,20,29,.92);
      border:1px solid rgba(255,255,255,.06);
      border-radius:28px; box-shadow:var(--shadow);
      padding:16px; backdrop-filter:blur(18px);
    }
    .input,.select,.textarea{
      width:100%; height:54px; border:none; outline:none; margin:8px 0;
      border-radius:18px; padding:0 16px; background:#0d1018;
      border:1px solid var(--line); color:#fff; font-size:16px;
    }
    .textarea{height:auto; min-height:96px; padding:14px; resize:vertical; font-family:inherit}
    .row{display:flex; gap:10px; flex-wrap:wrap}
    .btn{
      height:54px; border:none; border-radius:18px; cursor:pointer;
      font-size:16px; font-weight:900; padding:0 16px;
    }
    .btn.primary{flex:1; background:linear-gradient(135deg,var(--brand),var(--brand2)); color:#fff}
    .btn.secondary{min-width:120px; background:#232838; color:#e8ecf6}
    .hero-btn{height:58px; border:none; border-radius:999px; font-size:18px; font-weight:900; cursor:pointer; box-shadow:var(--shadow)}
    .hero-btn.light{background:#f3f4f7; color:#12131a}
    .hero-btn.dark{background:#1d256e; color:#fff}
    .welcome-actions{display:grid; gap:14px}
    .otp-box{display:none}.otp-box.show{display:block}
    .status{min-height:22px; margin-top:10px; font-size:14px; color:#ffbebe; word-break:break-word}
    .status.ok{color:var(--ok)}

    .topbar{
      position:sticky; top:0; z-index:30; height:62px; padding:0 16px;
      display:flex; align-items:center; justify-content:space-between;
      backdrop-filter:blur(14px); background:rgba(10,12,18,.76);
      border-bottom:1px solid rgba(255,255,255,.05);
    }
    .top-left{display:flex; align-items:center; gap:10px}
    .top-title{font-size:20px; font-weight:1000; letter-spacing:-.6px}
    .top-sub{font-size:12px; color:var(--muted); margin-top:2px}
    .tool-btn{
      height:38px; padding:0 14px; border:none; border-radius:12px; cursor:pointer;
      background:#202534; color:#eef2ff; font-weight:800;
    }
    .icon-btn{
      width:38px; height:38px; border:none; border-radius:12px; cursor:pointer;
      background:#202534; color:#eef2ff; font-weight:900;
      display:flex; align-items:center; justify-content:center;
    }
    .page{display:none; min-height:calc(100vh - 62px - 78px)}
    .page.active{display:block}
    .page-body{padding:16px 16px 92px}
    .card{
      background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.05);
      border-radius:22px; padding:14px; box-shadow:var(--shadow);
    }
    .card-title{font-size:15px; font-weight:1000; margin-bottom:8px}
    .card-sub{font-size:14px; color:#dbe3f4; line-height:1.55}
    .grid{display:grid; grid-template-columns:1fr 1fr; gap:12px}
    .section-title{font-size:12px; font-weight:900; color:var(--muted); letter-spacing:.7px; margin:14px 0 10px}
    .community-list,.notice-list,.member-list,.post-list{display:grid; gap:10px}
    .community-item,.notice-item,.member-item,.post-item{
      background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.05);
      border-radius:18px; padding:14px;
    }
    .community-row,.member-row,.post-head{display:flex; align-items:center; gap:10px; justify-content:space-between}
    .community-left,.member-left{display:flex; align-items:center; gap:10px}
    .hash{font-size:18px; color:#8d97aa}
    .community-name,.member-name{font-size:15px; font-weight:900}
    .community-topic,.notice-sub,.member-sub,.post-meta{font-size:12px; color:var(--muted); margin-top:4px}
    .dot{width:10px; height:10px; border-radius:50%}
    .dot.online{background:var(--ok)} .dot.afk{background:var(--warn)} .dot.busy{background:var(--busy)} .dot.offline{background:var(--off)}
    .post-text{margin-top:10px; font-size:15px; line-height:1.55; color:#eef2ff; white-space:pre-wrap; word-break:break-word}
    .composer{margin-top:12px}
    .compose-wrap{
      background:#0c1018; border:1px solid #212739; border-radius:20px;
      padding:10px; display:flex; gap:10px; align-items:flex-end;
    }
    .compose{
      flex:1; min-height:24px; max-height:140px; resize:none; border:none; outline:none;
      background:transparent; color:#fff; font-size:16px; font-family:inherit; line-height:1.45; padding:8px;
    }
    .send{
      min-width:86px; height:44px; border:none; border-radius:14px; cursor:pointer;
      background:linear-gradient(135deg,var(--brand),var(--brand2)); color:#fff; font-weight:900;
    }
    .avatar-mini,.avatar-big,.post-avatar{
      background:linear-gradient(135deg,var(--brand),#8a49ff);
      display:flex; align-items:center; justify-content:center; font-weight:900; overflow:hidden;
    }
    .avatar-mini{width:40px; height:40px; border-radius:14px}
    .avatar-big{width:96px; height:96px; border-radius:28px; border:4px solid #141821; font-size:34px}
    .post-avatar{width:42px; height:42px; border-radius:14px; flex:0 0 auto}
    .avatar-mini img,.avatar-big img,.post-avatar img{width:100%; height:100%; object-fit:cover}

    .profile-hero{
      background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.01));
      border:1px solid rgba(255,255,255,.05); border-radius:26px; overflow:hidden; box-shadow:var(--shadow);
    }
    .cover{height:180px; background:linear-gradient(135deg,#1a1f2f,#0b0d14) center/cover no-repeat}
    .profile-body{padding:0 18px 18px; position:relative}
    .name-line{display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-top:10px}
    .name{font-size:28px; font-weight:1000; letter-spacing:-1px}
    .badge{padding:7px 11px; border-radius:12px; background:#1e2432; font-size:12px; font-weight:900}
    .meta{margin-top:8px; color:var(--muted); line-height:1.5}
    .music-embed{width:100%; height:110px; border:none; border-radius:14px; background:#0d1018}
    .xp-box{
      margin-top:12px; padding:12px 14px; border-radius:18px;
      background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.05);
      font-size:14px; font-weight:900;
    }
    .progress{
      margin-top:10px; width:100%; height:10px; border-radius:999px;
      background:#0d1018; overflow:hidden; border:1px solid rgba(255,255,255,.05)
    }
    .progress-bar{
      height:100%; width:0%;
      background:linear-gradient(135deg,var(--brand),var(--brand2));
      border-radius:999px;
    }

    .sidebar{
      position:fixed; top:0; left:0; bottom:0; z-index:60;
      width:min(320px,calc(100% - 56px));
      background:rgba(9,11,16,.98);
      border-right:1px solid rgba(255,255,255,.05);
      transform:translateX(-100%);
      transition:.22s ease;
      padding:16px;
      overflow:auto;
    }
    .sidebar.open{transform:translateX(0)}
    .sidebar-top{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px}
    .sidebar-backdrop{
      position:fixed; inset:0; z-index:55; background:rgba(0,0,0,.35);
      display:none;
    }
    .sidebar-backdrop.show{display:block}

    .bottom-nav{
      position:fixed; left:50%; transform:translateX(-50%); bottom:8px; z-index:40;
      width:min(420px,calc(100% - 16px)); background:rgba(9,11,16,.84);
      backdrop-filter:blur(18px); border:1px solid rgba(255,255,255,.05);
      border-radius:20px; box-shadow:var(--shadow);
      padding:6px 6px calc(6px + env(safe-area-inset-bottom));
    }
    .nav-row{display:grid; grid-template-columns:repeat(3,1fr); gap:6px}
    .nav-btn{
      background:transparent; border:none; color:#838da1; padding:9px 4px; border-radius:14px;
      display:flex; flex-direction:column; align-items:center; gap:4px; font-size:11px; font-weight:900; cursor:pointer;
    }
    .nav-btn.active{background:rgba(107,22,255,.12); color:#cdb8ff}
    .nav-icon{font-size:18px; line-height:1}

    .modal{
      position:fixed; inset:0; z-index:100; background:rgba(0,0,0,.52);
      display:none; align-items:flex-end; justify-content:center; padding:12px;
    }
    .modal.open{display:flex}
    .sheet{
      width:min(430px,100%); max-height:90vh; overflow:auto; background:#0f121a;
      border:1px solid rgba(255,255,255,.06); border-radius:24px 24px 18px 18px;
      padding:14px; box-shadow:var(--shadow);
    }
    .sheet-handle{width:44px; height:5px; border-radius:999px; background:#31384d; margin:4px auto 12px}
    .sheet-head{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px}
    .sheet-title{font-size:20px; font-weight:1000; letter-spacing:-.6px}
    .file-row{display:flex; gap:8px; flex-wrap:wrap}
    .file-btn{
      display:inline-flex; align-items:center; justify-content:center;
      height:44px; padding:0 14px; border-radius:14px; background:#232838; color:#e8ecf6; font-weight:800; cursor:pointer;
    }
    .file-btn input{display:none}

    .toast-wrap{
      position:fixed; top:14px; left:50%; transform:translateX(-50%);
      width:min(360px,calc(100% - 18px)); display:grid; gap:8px; z-index:120; pointer-events:none;
    }
    .toast{
      display:flex; gap:10px; align-items:flex-start; padding:11px 12px; border-radius:16px;
      background:rgba(12,16,22,.95); border:1px solid rgba(255,255,255,.06); box-shadow:var(--shadow);
    }
    .toast .t-title{font-size:12px; font-weight:900}
    .toast .t-msg{font-size:11px; color:#c5cad5; margin-top:2px}

    @media (max-width:640px){
      .grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="toasts" class="toast-wrap"></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      api: "AIzaSyBzjGmkXQla3Ic09_j8JS5uEntx7F2jLEY",
      authDomain: "supa-dojo.firebaseapp.com",
      databaseURL: "https://supa-dojo-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "supa-dojo",
      storageBucket: "supa-dojo.firebasestorage.app",
      messagingSenderId: "1037833695190",
      appId: "1:1037833695190:web:ba1050f98a9e16a422be77"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    const API = "https://echonode-api.onrender.com/auth";

    const defaultCommunities = {
      general:{name:"general", topic:"Main space for everyone"},
      gaming:{name:"gaming", topic:"Games, squads, clips, and wins"},
      setup:{name:"setup", topic:"Gear, desks, and battlestations"}
    };

    const state = {
      authMode:"welcome",
      otpSent:false,
      email:"",
      displayName:"",
      user:null,
      currentCommunity:"general",
      currentPage:"home",
      communities:defaultCommunities,
      posts:{},
      notices:["Welcome to EchoNode","Communities are live","Profile tools are ready"],
      statusMap:{},
      unsubs:[],
      presenceRef:null,
      lastPostAt:0,
      sidebarOpen:false,
      profile:{
        displayName:"",
        mood:"Late night chat energy",
        level:1,
        xp:0,
        showcase:"Share your clips, thoughts, and community moments.",
        avatar:"",
        cover:"",
        musicUrl:"",
        presence:"online"
      }
    };

    const $ = s => document.querySelector(s);
    const $$ = s => document.querySelectorAll(s);

    function esc(s){
      const d = document.createElement("div");
      d.textContent = s == null ? "" : s;
      return d.innerHTML;
    }

    function initials(name){ return (name || "En").trim().slice(0,2); }
    function normalizeSongUrl(url){ return String(url || "").trim(); }
    function isDirectAudio(url){ return /\.(mp3|wav|ogg|m4a)(\?.*)?$/i.test(url || ""); }

    function spotifyEmbed(url){
      url = normalizeSongUrl(url);
      const kinds = ["track","episode","album","playlist"];
      for(let i=0;i<kinds.length;i++){
        const k = kinds[i];
        const m = url.match(new RegExp("spotify\\.com\\/" + k + "\\/([A-Za-z0-9]+)", "i"));
        if(m) return "https://open.spotify.com/embed/" + k + "/" + m[1];
      }
      return "";
    }

    function fileToDataUrl(file){
      return new Promise((resolve,reject)=>{
        const reader = new FileReader();
        reader.onload = ()=>resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function timeLabel(ts){
      if(!ts) return "";
      const d = new Date(ts);
      return d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
    }

    function presenceClass(v){
      return ["online","afk","busy","offline"].includes(v) ? v : "offline";
    }

    function getLevel(xp){
      if(xp < 100) return 1;
      if(xp < 300) return 2;
      if(xp < 600) return 3;
      if(xp < 1000) return 4;
      return 5;
    }

    function nextLevelXP(level){
      if(level <= 1) return 100;
      if(level === 2) return 300;
      if(level === 3) return 600;
      if(level === 4) return 1000;
      return level * 300;
    }

    function currentLevelBase(level){
      if(level <= 1) return 0;
      if(level === 2) return 100;
      if(level === 3) return 300;
      if(level === 4) return 600;
      return 1000 + ((level-5) * 300);
    }

    function progressPercent(xp, level){
      const base = currentLevelBase(level);
      const next = nextLevelXP(level);
      const span = Math.max(1, next - base);
      return Math.max(0, Math.min(100, ((xp - base) / span) * 100));
    }

    async function addXP(amount){
      const uid = auth.currentUser && auth.currentUser.uid;
      if(!uid) return;
      const ref = db.ref("users/" + uid);
      const snap = await ref.get();
      const data = snap.val() || {};
      const xp = (data.xp || 0) + amount;
      const level = getLevel(xp);
      await ref.update({ xp:xp, level:level });
      state.profile.xp = xp;
      state.profile.level = level;
      renderMain();
    }

    function setStatus(msg, ok){
      const el = $("#status");
      if(!el) return;
      el.textContent = msg || "";
      el.classList.toggle("ok", !!ok);
    }

    function showToast(title,msg){
      const wrap = $("#toasts");
      const el = document.createElement("div");
      el.className = "toast";
      el.innerHTML = `<div>✨</div><div><div class="t-title">${esc(title)}</div><div class="t-msg">${esc(msg)}</div></div>`;
      wrap.prepend(el);
      setTimeout(()=>el.remove(), 2200);
    }

    function clearUnsubs(){
      state.unsubs.forEach(fn=>{ try{ fn(); }catch(e){} });
      state.unsubs = [];
    }

    async function ensureCommunitiesExist(){
      const snap = await db.ref("communities").get();
      if(!snap.exists()) await db.ref("communities").set(defaultCommunities);
    }

    async function loadCommunities(){
      await ensureCommunitiesExist();
      const snap = await db.ref("communities").get();
      state.communities = snap.val() || defaultCommunities;
    }

    async function loadProfile(uid){
      const profileRef = db.ref("profiles/" + uid);
      const userRef = db.ref("users/" + uid);

      const pSnap = await profileRef.get();
      if(!pSnap.exists()){
        const profile = {
          displayName: state.displayName || state.email.split("@")[0],
          email: state.email,
          mood: state.profile.mood,
          showcase: state.profile.showcase,
          avatar: "",
          cover: "",
          musicUrl: "",
          presence: "online"
        };
        await profileRef.set(profile);
        state.profile = { ...state.profile, ...profile };
      }else{
        state.profile = { ...state.profile, ...pSnap.val() };
      }

      const uSnap = await userRef.get();
      const uVal = uSnap.val() || {};
      if(!uSnap.exists()){
        await userRef.set({ xp:0, level:1 });
      }
      state.profile.xp = uVal.xp || 0;
      state.profile.level = uVal.level || 1;
    }

    function subscribeToCommunity(communityId){
      const ref = db.ref("posts/" + communityId).limitToLast(50);
      const cb = snap => {
        const val = snap.val() || {};
        state.posts[communityId] = Object.entries(val).map(([id,v]) => ({ id, ...v }));
        if(state.currentPage === "home" && state.currentCommunity === communityId) renderMain();
      };
      ref.on("value", cb);
      state.unsubs.push(()=>ref.off("value", cb));
    }

    function subscribeStatus(){
      const ref = db.ref("status");
      const cb = snap => {
        state.statusMap = snap.val() || {};
        if(state.user) renderMain();
      };
      ref.on("value", cb);
      state.unsubs.push(()=>ref.off("value", cb));
    }

    function subscribeUserStats(){
      const uid = auth.currentUser && auth.currentUser.uid;
      if(!uid) return;
      const ref = db.ref("users/" + uid);
      const cb = snap => {
        const d = snap.val() || {};
        state.profile.xp = d.xp || 0;
        state.profile.level = d.level || 1;
        if(state.user) renderMain();
      };
      ref.on("value", cb);
      state.unsubs.push(()=>ref.off("value", cb));
    }

    async function subscribeAll(){
      clearUnsubs();
      await loadCommunities();
      Object.keys(state.communities).forEach(subscribeToCommunity);
      subscribeStatus();
      subscribeUserStats();
    }

    async function setPresence(mode){
      if(!state.user) return;
      state.profile.presence = mode;
      await db.ref("profiles/" + state.user.uid + "/presence").set(mode);
      await db.ref("status/" + state.user.uid).set({
        state: mode,
        last_changed: Date.now(),
        name: state.profile.displayName || state.email.split("@")[0] || "User"
      });
    }

    function bindPresence(){
      if(!state.user) return;
      const ref = db.ref("status/" + state.user.uid);
      state.presenceRef = ref;
      ref.onDisconnect().set({
        state:"offline",
        last_changed:Date.now(),
        name: state.profile.displayName || state.email.split("@")[0] || "User"
      });
      ref.set({
        state: state.profile.presence || "online",
        last_changed: Date.now(),
        name: state.profile.displayName || state.email.split("@")[0] || "User"
      });
    }

    async function sendCode(){
      state.email = ($("#email").value || "").trim().toLowerCase();
      if(state.authMode === "signup"){
        state.displayName = ($("#displayName").value || "").trim();
        if(!state.displayName) return setStatus("Enter a display name");
      }
      if(!state.email) return setStatus("Enter your email");

      setStatus("Sending code...");
      try{
        const r = await fetch(API + "/send-otp", {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({ email: state.email })
        });
        const d = await r.json().catch(()=>({}));
        if(!r.ok || !d.ok) return setStatus(d.error || "Failed to send code");
        state.otpSent = true;
        render();
        setStatus("Code sent. Check your email.", true);
      }catch(e){
        setStatus("Error: " + e.message);
      }
    }

    async function verifyCode(){
      const code = ($("#code").value || "").trim();
      if(!state.email) return setStatus("Enter your email");
      if(!/^\d{6}$/.test(code)) return setStatus("Enter the 6-digit code");

      setStatus("Verifying...");
      try{
        const r = await fetch(API + "/verify-otp", {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({ email: state.email, code })
        });
        const d = await r.json().catch(()=>({}));
        if(!d.token) return setStatus("Invalid or expired code");

        setStatus("Signing into Firebase...");
        const timeout = new Promise((_, reject)=>setTimeout(()=>reject(new Error("Firebase timeout")),10000));
        await Promise.race([auth.signInWithCustomToken(d.token), timeout]);
      }catch(err){
        setStatus("Error: " + err.message);
      }
    }

    async function createPost(){
      const box = $("#composer");
      if(!box || !state.user) return;
      const text = box.value.trim();
      if(!text) return;

      const now = Date.now();
      if(now - state.lastPostAt < 2000){
        showToast("Slow down", "Wait a moment before posting again");
        return;
      }

      state.lastPostAt = now;

      await db.ref("posts/" + state.currentCommunity).push({
        uid: state.user.uid,
        email: state.email,
        name: state.profile.displayName || state.email.split("@")[0],
        avatar: state.profile.avatar || "",
        text: text.slice(0, 700),
        createdAt: now
      });

      box.value = "";
      await addXP(5);
      showToast("Posted", "Your update is live");
    }

    function openEditor(){ $("#editorModal").classList.add("open"); }
    function closeEditor(){ $("#editorModal").classList.remove("open"); }

    async function saveProfile(){
      const next = {
        displayName: $("#profileName").value.trim() || state.profile.displayName,
        mood: $("#profileMood").value.trim() || state.profile.mood,
        showcase: $("#profileShowcase").value.trim() || state.profile.showcase,
        musicUrl: $("#profileMusic").value.trim(),
        presence: $("#profilePresence").value || state.profile.presence,
        avatar: state.profile.avatar || "",
        cover: state.profile.cover || ""
      };
      state.profile = { ...state.profile, ...next };
      await db.ref("profiles/" + state.user.uid).update(next);
      await setPresence(next.presence);
      closeEditor();
      renderMain();
      showToast("Saved", "Profile updated");
    }

    function renderAuth(){
      const signup = state.authMode === "signup";
      $("#app").innerHTML = `
        <div class="auth ${state.authMode!=="welcome"?"hidden":""}">
          <div class="welcome-top">
            <div class="logo">En</div>
            <h1>WELCOME TO<br>ECHONODE</h1>
            <p>Your space for communities, clips, voice notes later, and a profile shaped your way.</p>
          </div>
          <div class="welcome-actions">
            <button class="hero-btn light" id="goSignup">Register</button>
            <button class="hero-btn dark" id="goLogin">Log In</button>
          </div>
        </div>

        <div class="auth ${state.authMode==="welcome"?"hidden":""}">
          <div class="auth-card">
            <div class="logo" style="width:62px;height:62px;font-size:28px">En</div>
            <h1 style="font-size:22px;margin:0 0 8px;text-align:center">${signup ? "Create your EchoNode ID" : "Pick up the conversation"}</h1>
            <p style="text-align:center">${signup ? "Create your identity, join communities, and shape your profile the way you want." : "Enter with email, join communities, and keep your profile in your own style."}</p>
            <input class="input" id="email" placeholder="Email address" value="${esc(state.email)}">
            <input class="input ${signup ? "" : "hidden"}" id="displayName" placeholder="Display name" value="${esc(state.displayName)}">
            <div class="row">
              <button class="btn primary" id="sendBtn">Continue</button>
              <button class="btn secondary" id="fastBtn">Fast entry</button>
            </div>
            <div class="otp-box ${state.otpSent ? "show" : ""}">
              <input class="input" id="code" placeholder="6-digit verification code" inputmode="numeric" maxlength="6">
              <button class="btn primary" id="verifyBtn" style="width:100%">Verify & Enter</button>
            </div>
            <div class="status" id="status"></div>
            <div class="row" style="margin-top:10px">
              <button class="btn secondary" id="backBtn" style="width:100%">Back</button>
            </div>
          </div>
        </div>
      `;

      $("#goLogin").onclick = ()=>{ state.authMode="login"; state.otpSent=false; render(); };
      $("#goSignup").onclick = ()=>{ state.authMode="signup"; state.otpSent=false; render(); };
      $("#backBtn").onclick = ()=>{ state.authMode="welcome"; state.otpSent=false; render(); };
      $("#sendBtn").onclick = sendCode;
      $("#fastBtn").onclick = sendCode;
      $("#verifyBtn").onclick = verifyCode;
    }

    function renderSidebar(){
      return `
        <div class="sidebar-backdrop ${state.sidebarOpen ? "show" : ""}" id="sidebarBackdrop"></div>
        <aside class="sidebar ${state.sidebarOpen ? "open" : ""}" id="sidebar">
          <div class="sidebar-top">
            <div class="top-title">Communities</div>
            <button class="icon-btn" id="closeSidebarBtn">×</button>
          </div>
          <div class="community-list">
            ${Object.entries(state.communities).map(([id,c])=>`
              <div class="community-item" data-community="${id}">
                <div class="community-row">
                  <div class="community-left">
                    <div class="hash">#</div>
                    <div>
                      <div class="community-name">${esc(c.name)}</div>
                      <div class="community-topic">${esc(c.topic || "")}</div>
                    </div>
                  </div>
                  <button class="tool-btn">${state.currentCommunity===id ? "Open" : "Go"}</button>
                </div>
              </div>
            `).join("")}
          </div>
        </aside>
      `;
    }

    function renderHomePage(){
      const current = state.communities[state.currentCommunity] || Object.values(state.communities)[0];
      const posts = state.posts[state.currentCommunity] || [];

      return `
        <div class="page ${state.currentPage==="home"?"active":""}" id="page-home">
          <div class="topbar">
            <div class="top-left">
              <button class="icon-btn" id="openSidebarBtn">☰</button>
              <div>
                <div class="top-title">Home</div>
                <div class="top-sub">${esc(current.name)} • Latest clips, thoughts, and community drops</div>
              </div>
            </div>
          </div>

          <div class="page-body">
            <div class="composer">
              <div class="compose-wrap">
                <textarea class="compose" id="composer" placeholder="Share something with ${esc(current.name)}"></textarea>
                <button class="send" id="sendPostBtn">Post</button>
              </div>
            </div>

            <div class="section-title">LATEST POSTS</div>
            <div class="post-list">
              ${posts.length ? posts.slice().reverse().map(p=>`
                <div class="post-item">
                  <div class="post-head">
                    <div class="member-left">
                      <div class="post-avatar">${p.avatar ? `<img src="${p.avatar}" alt="">` : esc(initials(p.name || "U"))}</div>
                      <div>
                        <div class="community-name">${esc(p.name || "User")}</div>
                        <div class="post-meta">${esc(current.name)} • ${esc(timeLabel(p.createdAt))}</div>
                      </div>
                    </div>
                  </div>
                  <div class="post-text">${esc(p.text || "")}</div>
                </div>
              `).join("") : `
                <div class="card">
                  <div class="card-title">No posts yet</div>
                  <div class="card-sub">Be the first one to share something in ${esc(current.name)}.</div>
                </div>
              `}
            </div>
          </div>
        </div>
      `;
    }

    function renderNoticesPage(){
      return `
        <div class="page ${state.currentPage==="notices"?"active":""}" id="page-notices">
          <div class="topbar">
            <div>
              <div class="top-title">Notifications</div>
              <div class="top-sub">Updates, activity, and member presence</div>
            </div>
          </div>
          <div class="page-body">
            <div class="grid" style="margin-bottom:12px">
              <div class="card">
                <div class="card-title">Members online</div>
                <div class="card-sub">${Object.values(state.statusMap||{}).filter(x=>x.state==="online").length}</div>
              </div>
              <div class="card">
                <div class="card-title">Total communities</div>
                <div class="card-sub">${Object.keys(state.communities||{}).length}</div>
              </div>
            </div>

            <div class="section-title">SYSTEM</div>
            <div class="notice-list">
              ${state.notices.map(n=>`
                <div class="notice-item">
                  <div class="card-title">Notice</div>
                  <div class="notice-sub">${esc(n)}</div>
                </div>
              `).join("")}
            </div>

            <div class="section-title">MEMBERS</div>
            <div class="member-list">
              ${Object.values(state.statusMap||{}).map(s=>`
                <div class="member-item">
                  <div class="member-row">
                    <div class="member-left">
                      <span class="dot ${presenceClass(s.state)}"></span>
                      <span class="member-name">${esc(s.name||"User")}</span>
                    </div>
                    <span class="member-sub">${esc(s.state||"offline")}</span>
                  </div>
                </div>
              `).join("")}
            </div>
          </div>
        </div>
      `;
    }

    function renderProfilePage(){
      const p = state.profile;
      const avatarInner = p.avatar ? `<img src="${p.avatar}" alt="">` : esc(initials(p.displayName || state.email));
      let musicCard = `<div class="card-title">Music</div><div class="card-sub">Add Spotify, MP3, or a direct link from edit profile.</div>`;
      const sp = spotifyEmbed(p.musicUrl);
      if(p.musicUrl && sp){
        musicCard = `<div class="card-title">Music</div><iframe class="music-embed" src="${sp}" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>`;
      } else if(p.musicUrl && isDirectAudio(p.musicUrl)){
        musicCard = `<div class="card-title">Music</div><audio controls preload="none" src="${p.musicUrl}" style="width:100%;margin-top:8px"></audio>`;
      } else if(p.musicUrl){
        musicCard = `<div class="card-title">Music</div><div class="card-sub"><a href="${p.musicUrl}" target="_blank" style="color:#a78bfa;word-break:break-all">${esc(p.musicUrl)}</a></div>`;
      }

      const pct = progressPercent(p.xp || 0, p.level || 1);

      return `
        <div class="page ${state.currentPage==="profile"?"active":""}" id="page-profile">
          <div class="topbar">
            <div>
              <div class="top-title">Your profile</div>
              <div class="top-sub">Identity, style, and progress</div>
            </div>
            <button class="tool-btn" id="editProfileTopBtn">Edit</button>
          </div>
          <div class="page-body">
            <div class="profile-hero">
              <div class="cover" style="${p.cover ? `background-image:url('${p.cover}')` : ''}"></div>
              <div class="profile-body">
                <div class="avatar-big">${avatarInner}</div>
                <div class="name-line">
                  <div class="name">${esc(p.displayName || state.email.split("@")[0])}</div>
                  <span class="badge">${esc(p.presence || "online")}</span>
                  <span class="badge">LVL ${esc(p.level || 1)}</span>
                </div>
                <div class="meta">${esc(p.mood || "")}</div>
                <div class="xp-box">
                  XP: ${esc(p.xp || 0)} ⭐
                  <div class="progress"><div class="progress-bar" style="width:${pct}%"></div></div>
                </div>
                <div class="grid" style="margin-top:16px">
                  <div class="card">
                    <div class="card-title">My Space</div>
                    <div class="card-sub">${esc(p.showcase || "")}</div>
                  </div>
                  <div class="card">${musicCard}</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderMain(){
      $("#app").innerHTML = `
        ${renderSidebar()}
        ${renderHomePage()}
        ${renderNoticesPage()}
        ${renderProfilePage()}

        <div class="bottom-nav">
          <div class="nav-row">
            <button class="nav-btn ${state.currentPage==="home"?"active":""}" data-page="home">
              <span class="nav-icon">⌂</span><span>Home</span>
            </button>
            <button class="nav-btn ${state.currentPage==="notices"?"active":""}" data-page="notices">
              <span class="nav-icon">🔔</span><span>Alerts</span>
            </button>
            <button class="nav-btn ${state.currentPage==="profile"?"active":""}" data-page="profile">
              <span class="nav-icon">◉</span><span>Profile</span>
            </button>
          </div>
        </div>

        <div class="modal" id="editorModal">
          <div class="sheet">
            <div class="sheet-handle"></div>
            <div class="sheet-head">
              <div class="sheet-title">Edit profile</div>
              <button class="tool-btn" id="closeEditorBtn">Close</button>
            </div>
            <input class="input" id="profileName" placeholder="Display name" value="${esc(state.profile.displayName||"")}">
            <input class="input" id="profileMood" placeholder="Mood / status text" value="${esc(state.profile.mood||"")}">
            <select class="select input" id="profilePresence">
              <option value="online" ${state.profile.presence==="online"?"selected":""}>online</option>
              <option value="afk" ${state.profile.presence==="afk"?"selected":""}>afk</option>
              <option value="busy" ${state.profile.presence==="busy"?"selected":""}>busy</option>
              <option value="offline" ${state.profile.presence==="offline"?"selected":""}>offline</option>
            </select>
            <input class="input" id="profileMusic" placeholder="Spotify / MP3 / music link" value="${esc(state.profile.musicUrl||"")}">
            <textarea class="textarea" id="profileShowcase" placeholder="My Space text">${esc(state.profile.showcase||"")}</textarea>
            <div class="file-row">
              <label class="file-btn">Avatar<input type="file" id="avatarFile" accept="image/*"></label>
              <label class="file-btn">Cover<input type="file" id="coverFile" accept="image/*"></label>
            </div>
            <div class="row" style="margin-top:10px">
              <button class="btn primary" id="saveProfileBtn">Save</button>
            </div>
          </div>
        </div>
      `;

      $$("[data-page]").forEach(btn=>{
        btn.onclick = ()=>{
          state.currentPage = btn.dataset.page;
          renderMain();
        };
      });

      $$(".community-item[data-community]").forEach(card=>{
        card.onclick = ()=>{
          state.currentCommunity = card.dataset.community;
          state.currentPage = "home";
          state.sidebarOpen = false;
          renderMain();
        };
      });

      $("#openSidebarBtn") && ($("#openSidebarBtn").onclick = ()=>{
        state.sidebarOpen = true;
        renderMain();
      });
      $("#closeSidebarBtn") && ($("#closeSidebarBtn").onclick = ()=>{
        state.sidebarOpen = false;
        renderMain();
      });
      $("#sidebarBackdrop") && ($("#sidebarBackdrop").onclick = ()=>{
        state.sidebarOpen = false;
        renderMain();
      });

      $("#sendPostBtn") && ($("#sendPostBtn").onclick = createPost);
      $("#composer") && $("#composer").addEventListener("keydown", e=>{
        if(e.key==="Enter" && !e.shiftKey){
          e.preventDefault();
          createPost();
        }
      });

      $("#editProfileTopBtn") && ($("#editProfileTopBtn").onclick = openEditor);
      $("#closeEditorBtn").onclick = closeEditor;
      $("#editorModal").onclick = e => { if(e.target.id==="editorModal") closeEditor(); };
      $("#saveProfileBtn").onclick = saveProfile;

      $("#avatarFile").onchange = async e => {
        const f = e.target.files && e.target.files[0];
        if(!f) return;
        state.profile.avatar = await fileToDataUrl(f);
        showToast("Avatar ready", "Save profile to keep it");
      };

      $("#coverFile").onchange = async e => {
        const f = e.target.files && e.target.files[0];
        if(!f) return;
        state.profile.cover = await fileToDataUrl(f);
        showToast("Cover ready", "Save profile to keep it");
      };
    }

    auth.onAuthStateChanged(async user=>{
      if(!user){
        state.user = null;
        clearUnsubs();
        render();
        return;
      }
      state.user = user;
      await loadProfile(user.uid);
      await subscribeAll();
      bindPresence();
      renderMain();
    });

    function render(){
      if(state.user) renderMain();
      else renderAuth();
    }

    render();
  </script>
</body>
</html>
