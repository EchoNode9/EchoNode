<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>EchoNode Founder Edition v3</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#090b11; --panel:#121725; --panel2:#171f2e; --panel3:#0d1018;
      --line:#283248; --text:#f6f8ff; --muted:#97a4bf;
      --brand:#6b16ff; --brand2:#8b4dff; --shadow:0 20px 60px rgba(0,0,0,.38);
      --ok:#4ade80; --warn:#f59e0b; --busy:#ef4444; --off:#64748b;
      --safe-bottom:env(safe-area-inset-bottom);
    }
    html,body{
      margin:0; min-height:100%;
      background:
        radial-gradient(circle at top left, rgba(107,22,255,.17), transparent 25%),
        radial-gradient(circle at top right, rgba(111,66,193,.08), transparent 24%),
        linear-gradient(180deg,#090b11,#080a10 60%,#07090f);
      color:var(--text);
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }
    body{min-height:100vh}
    #app{min-height:100vh}
    .hidden{display:none!important}
    .fade{animation:fade .22s ease}
    @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
    a{color:inherit;text-decoration:none}

    .auth{
      min-height:100vh; width:min(460px,100%); margin:0 auto;
      display:flex; flex-direction:column; justify-content:space-between;
      padding:24px 18px 32px;
    }
    .welcome-top{padding-top:46px; text-align:center}
    .brand-logo{width:120px;height:120px;margin:0 auto 16px; display:block; filter:drop-shadow(0 16px 30px rgba(107,22,255,.22))}
    .auth h1{font-size:34px; line-height:1.02; letter-spacing:-1.6px; margin:0 0 12px}
    .auth p{margin:0 auto; max-width:330px; color:#ebefff; opacity:.94; line-height:1.56}
    .auth-card{
      background:rgba(14,17,26,.95); border:1px solid rgba(255,255,255,.06);
      border-radius:30px; box-shadow:var(--shadow); padding:16px;
      backdrop-filter:blur(18px);
    }
    .tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
    .tab{
      height:44px;border:none;border-radius:15px;cursor:pointer;font-weight:900;
      color:#d7def0;background:#202534;
    }
    .tab.active{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff}
    .input,.select,.textarea{
      width:100%; height:54px; border:none; outline:none; margin:8px 0;
      border-radius:18px; padding:0 16px; background:#0d1018;
      border:1px solid var(--line); color:#fff; font-size:16px;
    }
    .textarea{height:auto; min-height:108px; padding:14px; resize:vertical; font-family:inherit}
    .row{display:flex; gap:10px; flex-wrap:wrap}
    .btn{
      height:54px; border:none; border-radius:18px; cursor:pointer;
      font-size:16px; font-weight:900; padding:0 16px;
    }
    .btn.primary{flex:1;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff}
    .btn.secondary{min-width:120px;background:#242a3a;color:#e8ecf6}
    .hero-btn{height:58px;border:none;border-radius:999px;font-size:18px;font-weight:900;cursor:pointer;box-shadow:var(--shadow)}
    .hero-btn.light{background:#f4f6fb;color:#101119}
    .hero-btn.dark{background:#1f2468;color:#fff}
    .welcome-actions{display:grid; gap:14px}
    .otp-box{display:none}.otp-box.show{display:block}
    .status{min-height:22px; margin-top:10px; font-size:14px; color:#ffbebe; word-break:break-word}
    .status.ok{color:var(--ok)}
    .mini-note{
      margin-top:8px;padding:10px 12px;border-radius:14px;background:#121826;border:1px solid rgba(255,255,255,.05);
      font-size:12px;color:#d4dbef;line-height:1.55
    }

    .topbar{
      position:sticky; top:0; z-index:30; min-height:64px; padding:10px 16px;
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      backdrop-filter:blur(14px); background:rgba(9,11,17,.82);
      border-bottom:1px solid rgba(255,255,255,.05);
    }
    .top-left,.top-right{display:flex;align-items:center;gap:10px}
    .top-title{font-size:22px;font-weight:1000;letter-spacing:-.7px}
    .top-sub{font-size:12px;color:var(--muted);margin-top:2px}
    .icon-btn,.tool-btn{
      border:none;cursor:pointer;color:#fff;background:#202534;
      display:inline-flex;align-items:center;justify-content:center;
      box-shadow:0 8px 20px rgba(0,0,0,.14)
    }
    .icon-btn{width:40px;height:40px;border-radius:14px}
    .tool-btn{height:40px;padding:0 14px;border-radius:14px;font-weight:900}
    .tiny-edit{
      width:34px;height:34px;border-radius:12px;border:none;background:#202534;color:#fff;cursor:pointer;
      display:inline-flex;align-items:center;justify-content:center; box-shadow:0 8px 20px rgba(0,0,0,.14)
    }
    .icon-s{width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center}
    .icon-s svg{width:100%;height:100%;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .icon-s.fill svg{fill:#fff;stroke:none}

    .page{display:none; min-height:calc(100vh - 72px - 84px)}
    .page.active{display:block}
    .page-body{padding:16px 16px calc(96px + var(--safe-bottom))}
    .card{
      background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.05);
      border-radius:24px; padding:14px; box-shadow:var(--shadow);
    }
    .card-title{font-size:15px;font-weight:1000;margin-bottom:8px}
    .card-sub{font-size:14px;color:#dbe3f4;line-height:1.55}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .section-title{font-size:12px;font-weight:900;color:var(--muted);letter-spacing:.7px;margin:14px 0 10px}

    .search-shell{
      display:flex;align-items:center;gap:10px;background:#0d1018;border:1px solid var(--line);
      border-radius:20px;padding:0 14px;height:54px;
    }
    .search-shell input{
      background:transparent;border:none;outline:none;color:#fff;font-size:16px;flex:1
    }
    .search-results{display:grid;gap:8px;margin-top:12px}
    .search-result{
      background:#101624;border:1px solid rgba(255,255,255,.05);border-radius:18px;padding:12px;cursor:pointer;
    }

    .community-list,.post-list,.thread-list,.setting-list{display:grid;gap:10px}
    .community-item,.post-item,.thread-item,.message-bubble,.setting-item{
      background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.05);
      border-radius:20px; padding:14px;
    }
    .community-row,.post-head,.thread-row,.setting-row{display:flex; align-items:center; gap:10px; justify-content:space-between}
    .community-left,.thread-left,.member-left,.setting-left{display:flex; align-items:center; gap:10px}
    .hash{font-size:18px;color:#8d97aa}
    .community-name,.post-name,.thread-name,.setting-name{font-size:15px;font-weight:900}
    .community-topic,.post-meta,.thread-sub,.muted,.setting-sub{font-size:12px;color:var(--muted);margin-top:4px}
    .dot{width:10px;height:10px;border-radius:50%}
    .dot.online{background:var(--ok)} .dot.afk{background:var(--warn)} .dot.busy{background:var(--busy)} .dot.offline{background:var(--off)}

    .post-item{padding:16px}
    .post-text{margin-top:10px;font-size:15px;line-height:1.6;color:#eef2ff;white-space:pre-wrap;word-break:break-word}
    .post-actions{display:flex;gap:10px;align-items:center;margin-top:12px;flex-wrap:wrap}
    .pill-action{
      border:none;background:#111624;color:#dfe7fb;height:40px;padding:0 14px;border-radius:999px;
      cursor:pointer;font-weight:900;display:inline-flex;align-items:center;gap:8px
    }
    .pill-action.active{background:rgba(107,22,255,.18);color:#dbcfff}
    .chip{
      display:inline-flex;align-items:center;gap:8px;height:34px;padding:0 12px;border-radius:999px;
      background:#121826;border:1px solid rgba(255,255,255,.05);color:#dbe3f4;font-size:12px;font-weight:900
    }

    .composer{margin-top:12px}
    .compose-wrap{
      background:#0c1018;border:1px solid #212739;border-radius:22px;padding:10px;
      display:flex;gap:10px;align-items:flex-end;
    }
    .compose{
      flex:1; min-height:26px; max-height:140px; resize:none; border:none; outline:none;
      background:transparent; color:#fff; font-size:16px; font-family:inherit; line-height:1.45; padding:8px;
    }
    .send{
      min-width:86px;height:44px;border:none;border-radius:14px;cursor:pointer;
      background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;font-weight:900;
    }

    .avatar-mini,.avatar-big,.post-avatar,.friend-avatar{
      background:linear-gradient(135deg,var(--brand),#8a49ff);
      display:flex;align-items:center;justify-content:center;font-weight:900;overflow:hidden;
    }
    .avatar-big{width:96px;height:96px;border-radius:28px;border:4px solid #141821;font-size:34px}
    .post-avatar,.friend-avatar{width:44px;height:44px;border-radius:14px;flex:0 0 auto}
    .friend-avatar{width:58px;height:58px;border-radius:50%}
    .avatar-big img,.post-avatar img,.friend-avatar img{width:100%;height:100%;object-fit:cover}

    .profile-hero{
      background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.01));
      border:1px solid rgba(255,255,255,.05); border-radius:28px; overflow:hidden; box-shadow:var(--shadow);
    }
    .cover{
      height:170px;background:linear-gradient(135deg,#1a1f2f,#0b0d14) center/cover no-repeat;
      position:relative;
    }
    .cover::after{
      content:""; position:absolute; left:0; right:0; bottom:0; height:80px;
      background:linear-gradient(180deg, rgba(0,0,0,0), rgba(9,11,17,.88));
    }
    .profile-body{padding:0 18px 18px; position:relative; margin-top:-54px}
    .name-line{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:10px}
    .name{font-size:28px;font-weight:1000;letter-spacing:-1px}
    .badge{padding:7px 11px;border-radius:12px;background:#1e2432;font-size:12px;font-weight:900}
    .meta{margin-top:8px;color:var(--muted);line-height:1.5}
    .music-embed{width:100%;height:110px;border:none;border-radius:14px;background:#0d1018}
    .xp-box{
      margin-top:12px; padding:12px 14px; border-radius:18px; background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.05); font-size:14px; font-weight:900;
    }
    .progress{margin-top:10px;width:100%;height:10px;border-radius:999px;background:#0d1018;overflow:hidden;border:1px solid rgba(255,255,255,.05)}
    .progress-bar{height:100%;width:0%;background:linear-gradient(135deg,var(--brand),var(--brand2));border-radius:999px}

    .showcase-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}
    .showcase-item{
      aspect-ratio:4/5;border-radius:20px;background:#0d111a;border:1px dashed rgba(255,255,255,.10);
      overflow:hidden;display:flex;align-items:center;justify-content:center;color:#9eabc6;font-size:12px;font-weight:900
    }
    .showcase-item img{width:100%;height:100%;object-fit:cover}
    @media (min-width: 900px){ .showcase-item{aspect-ratio:5/4} }

    .friends-strip{display:flex;align-items:center;gap:10px;overflow:auto;padding-bottom:2px;margin-top:10px}
    .friend-stack{display:flex;flex-direction:column;align-items:center;gap:6px;min-width:62px;cursor:pointer}
    .friend-name{font-size:11px;color:#cfd7ea;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:64px}

    .dm-layout{display:grid;grid-template-columns:1fr;gap:12px}
    .dm-window{
      background:#0d1018;border:1px solid rgba(255,255,255,.05);border-radius:22px;padding:12px;min-height:360px;
      display:flex;flex-direction:column;
    }
    .dm-messages{display:grid;gap:10px;flex:1;overflow:auto;padding-right:2px}
    .message-bubble.self{background:rgba(107,22,255,.15);border-color:rgba(107,22,255,.28)}
    .message-bubble .t{font-size:14px;line-height:1.55}
    .message-bubble .m{font-size:11px;color:var(--muted);margin-top:6px}
    .dm-compose{display:flex;gap:10px;margin-top:12px}

    .sidebar{
      position:fixed; top:0; left:0; bottom:0; z-index:60;
      width:min(336px,calc(100% - 56px));
      background:rgba(8,10,16,.98); border-right:1px solid rgba(255,255,255,.05);
      transform:translateX(-100%); transition:.22s ease; padding:16px; overflow:auto;
    }
    .sidebar.open{transform:translateX(0)}
    .sidebar-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .sidebar-backdrop{position:fixed; inset:0; z-index:55; background:rgba(0,0,0,.42); display:none}
    .sidebar-backdrop.show{display:block}

    .bottom-nav{
      position:fixed; left:50%; transform:translateX(-50%); bottom:8px; z-index:40;
      width:min(430px,calc(100% - 16px)); background:rgba(8,10,16,.86);
      backdrop-filter:blur(18px); border:1px solid rgba(255,255,255,.05);
      border-radius:22px; box-shadow:var(--shadow);
      padding:6px 6px calc(6px + var(--safe-bottom));
    }
    .nav-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
    .nav-btn{
      background:transparent;border:none;color:#838da1;padding:10px 4px;border-radius:16px;
      display:flex;flex-direction:column;align-items:center;gap:4px;font-size:11px;font-weight:900;cursor:pointer;
    }
    .nav-btn.active{background:rgba(107,22,255,.12);color:#fff}
    .nav-btn.active svg{stroke:#fff}
    .nav-icon{font-size:18px;line-height:1}

    .modal,.drawer{
      position:fixed; inset:0; z-index:100; background:rgba(0,0,0,.52);
      display:none; align-items:flex-end; justify-content:center; padding:12px;
    }
    .modal.open,.drawer.open{display:flex}
    .sheet{
      width:min(460px,100%); max-height:90vh; overflow:auto; background:#0f121a;
      border:1px solid rgba(255,255,255,.06); border-radius:24px 24px 18px 18px; padding:14px; box-shadow:var(--shadow);
    }
    .sheet-handle{width:44px;height:5px;border-radius:999px;background:#31384d;margin:4px auto 12px}
    .sheet-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
    .sheet-title{font-size:20px;font-weight:1000;letter-spacing:-.6px}
    .file-row{display:flex;gap:8px;flex-wrap:wrap}
    .file-btn{
      display:inline-flex; align-items:center; justify-content:center;
      height:44px; padding:0 14px; border-radius:14px; background:#232838; color:#e8ecf6; font-weight:800; cursor:pointer;
    }
    .file-btn input{display:none}
    .switch{width:48px;height:28px;border-radius:999px;background:#2a3347;position:relative;cursor:pointer;border:none}
    .switch::after{content:"";position:absolute;top:4px;left:4px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s}
    .switch.on{background:#6b16ff}
    .switch.on::after{left:24px}

    .toast-wrap{
      position:fixed; top:14px; left:50%; transform:translateX(-50%);
      width:min(360px,calc(100% - 18px)); display:grid; gap:8px; z-index:120; pointer-events:none;
    }
    .toast{
      display:flex; gap:10px; align-items:flex-start; padding:11px 12px; border-radius:16px;
      background:rgba(12,16,22,.95); border:1px solid rgba(255,255,255,.06); box-shadow:var(--shadow);
    }
    .toast .t-title{font-size:12px;font-weight:900}
    .toast .t-msg{font-size:11px;color:#c5cad5;margin-top:2px}

    .ai-fab{
      position:fixed; right:16px; bottom:98px; z-index:50;
      width:56px;height:56px;border:none;border-radius:18px;cursor:pointer;
      background:linear-gradient(135deg,#7b35ff,#9f6dff);color:#fff;font-size:24px;box-shadow:var(--shadow)
    }

    @media (max-width:640px){ .grid{grid-template-columns:1fr} }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="toasts" class="toast-wrap"></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAyiOoVQ2n8scNNf5SjnfBVtrJbt5wiVko",
      authDomain: "supa-dojo.firebaseapp.com",
      databaseURL: "https://supa-dojo-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "supa-dojo",

      messagingSenderId: "1037833695190",
      appId: "1:1037833695190:web:02b349414c61f13322be77"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    const API = "https://echonode-api.onrender.com/auth";
    const FOUNDER_EMAIL = "aaoouua00@gmail.com";

    const countryOptions = [
      { code:"SA", flag:"🇸🇦", name:"Saudi Arabia" },
      { code:"US", flag:"🇺🇸", name:"United States" },
      { code:"GB", flag:"🇬🇧", name:"United Kingdom" },
      { code:"JP", flag:"🇯🇵", name:"Japan" },
      { code:"KR", flag:"🇰🇷", name:"South Korea" },
      { code:"DE", flag:"🇩🇪", name:"Germany" },
      { code:"FR", flag:"🇫🇷", name:"France" },
      { code:"BR", flag:"🇧🇷", name:"Brazil" },
      { code:"TR", flag:"🇹🇷", name:"Turkey" },
      { code:"AE", flag:"🇦🇪", name:"UAE" },
      { code:"EG", flag:"🇪🇬", name:"Egypt" }
    ];

    function icon(name){
      const icons = {
        menu:`<svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h16"/></svg>`,
        bell:`<svg viewBox="0 0 24 24"><path d="M15 17H5.8a1 1 0 0 1-.8-1.6L7 12.8V10a5 5 0 0 1 10 0v2.8l2 2.6a1 1 0 0 1-.8 1.6H15m0 0a3 3 0 0 1-6 0"/></svg>`,
        settings:`<svg viewBox="0 0 24 24"><circle cx="5" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="19" cy="12" r="1.6"/></svg>`,
        home:`<svg viewBox="0 0 24 24"><path d="M3 10.5 12 4l9 6.5"/><path d="M5 9.8V20h14V9.8"/></svg>`,
        base:`<svg viewBox="0 0 24 24"><path d="M8 8h8v8H8z"/><path d="M3 8h3M18 8h3M3 16h3M18 16h3M8 3v3M16 3v3M8 18v3M16 18v3"/></svg>`,
        profile:`<svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M5 20a7 7 0 0 1 14 0"/></svg>`,
        search:`<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="6"/><path d="M20 20l-4-4"/></svg>`,
        plus:`<svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>`,
        ai:`<svg viewBox="0 0 24 24"><path d="M12 3 14 9l6 2-6 2-2 6-2-6-6-2 6-2 2-6Z"/></svg>`,
        close:`<svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6l-12 12"/></svg>`,
        arrow:`<svg viewBox="0 0 24 24"><path d="M5 12h14M13 5l7 7-7 7"/></svg>`,
        edit:`<svg viewBox="0 0 24 24"><path d="M4 20h4l10-10-4-4L4 16v4Z"/><path d="m12 6 4 4"/></svg>`,
        block:`<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><path d="M7 17 17 7"/></svg>`,
        lock:`<svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V8a4 4 0 1 1 8 0v3"/></svg>`
      };
      return `<span class="icon-s">${icons[name] || ''}</span>`;
    }

    const defaultCommunities = {
      all:{name:"home", topic:"Top posts and strongest community drops"},
      general:{name:"general", topic:"Main space for everyone"},
      gaming:{name:"gaming", topic:"Games, squads, clips, and wins"},
      setup:{name:"setup", topic:"Gear, desks, and battlestations"},
      anime:{name:"anime", topic:"Fandoms, art, and reactions"},
      code:{name:"code", topic:"Coding, UI, and builds"}
    };

    const defaultPrivacy = { showBirthday:false, showCountry:true, notificationsEnabled:true };
    const defaultProfile = {
      displayName:"", email:"", mood:"Late night cat-energy online", level:1, xp:0,
      mySpace:"Your clips, thoughts, and best drops live here.", avatar:"", cover:"",
      musicUrl:"", presence:"online", gender:"", friendsVisibility:"public", showcase1:"", showcase2:"", showcase3:"",
      founder:false, countryCode:"SA", countryFlag:"🇸🇦", countryName:"Saudi Arabia",
      birthday:"", blockedUsers:{}, securityKey:"", ...defaultPrivacy
    };

    const state = {
      authMode:"welcome", accountMode:"signin", otpSent:false, accountExists:false,
      email:"", displayName:"", user:null, currentCommunity:"all", currentPage:"home",
      draftPostImage:"", draftPostLink:"",
      communities:defaultCommunities, posts:{}, profiles:{}, statusMap:{}, threads:{},
      selectedDmUid:"", viewingProfileUid:"", sidebarOpen:false, settingsOpen:false, aiOpen:false, createCommunityOpen:false,
      unsubs:[], presenceRef:null, lastPostAt:0, founder:false, searchHome:"", searchBase:"",
      profile:{ ...defaultProfile }
    };

    const $ = s => document.querySelector(s);
    const $$ = s => document.querySelectorAll(s);
    const esc = s => { const d=document.createElement("div"); d.textContent=s==null?"":s; return d.innerHTML; };
    const emailKey = v => String(v || "").trim().toLowerCase().replace(/[.#$/[\]]/g, "_");
    const initials = name => (name || "EN").trim().slice(0,2).toUpperCase();

    function fileToDataUrl(file){
      return new Promise((resolve,reject)=>{
        const reader = new FileReader();
        reader.onload = ()=>resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function normalizeSongUrl(url){ return String(url || "").trim(); }
    function isDirectAudio(url){ return /\.(mp3|wav|ogg|m4a)(\?.*)?$/i.test(url || ""); }
    function spotifyEmbed(url){
      url = normalizeSongUrl(url);
      const kinds = ["track","episode","album","playlist"];
      for(const k of kinds){
        const m = url.match(new RegExp("spotify\\.com\\/" + k + "\\/([A-Za-z0-9]+)", "i"));
        if(m) return "https://open.spotify.com/embed/" + k + "/" + m[1];
      }
      return "";
    }

    function youtubeEmbed(url){
      url = String(url || "").trim();
      const a = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([A-Za-z0-9_-]{6,})/i);
      return a ? `https://www.youtube.com/embed/${a[1]}` : "";
    }
    function resetDraftMedia(){
      state.draftPostImage = "";
      state.draftPostLink = "";

    function timeLabel(ts){ if(!ts) return ""; const d=new Date(ts); return d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"}); }
    function dateLabel(ts){ if(!ts) return ""; const d=new Date(ts); return d.toLocaleDateString([], {month:"short", day:"numeric"}); }
    function presenceClass(v){ return ["online","afk","busy","offline"].includes(v) ? v : "offline"; }
    function getLevel(xp){ if(xp<100) return 1; if(xp<300) return 2; if(xp<600) return 3; if(xp<1000) return 4; return 5; }
    function nextLevelXP(level){ if(level<=1)return 100; if(level===2)return 300; if(level===3)return 600; if(level===4)return 1000; return level*300; }
    function currentLevelBase(level){ if(level<=1)return 0; if(level===2)return 100; if(level===3)return 300; if(level===4)return 600; return 1000+((level-5)*300); }
    function progressPercent(xp, level){ const base=currentLevelBase(level), next=nextLevelXP(level), span=Math.max(1,next-base); return Math.max(0, Math.min(100, ((xp-base)/span)*100)); }
    function toast(title,msg){ const wrap=$("#toasts"); const el=document.createElement("div"); el.className="toast"; el.innerHTML=`<div>✨</div><div><div class="t-title">${esc(title)}</div><div class="t-msg">${esc(msg)}</div></div>`; wrap.prepend(el); setTimeout(()=>el.remove(),2200); }
    function setStatus(msg, ok){ const el=$("#status"); if(!el) return; el.textContent=msg||""; el.classList.toggle("ok", !!ok); }
    function clearUnsubs(){ state.unsubs.forEach(fn=>{try{fn();}catch(e){}}); state.unsubs=[]; }

    async function ensureCommunitiesExist(){
      const ref = db.ref("communities");
      const snap = await ref.get();
      if(!snap.exists()){
        const toSave = Object.fromEntries(Object.entries(defaultCommunities).filter(([k])=>k!=="all"));
        await ref.set(toSave);
      }
    }
    async function loadCommunities(){
      await ensureCommunitiesExist();
      const snap = await db.ref("communities").get();
      state.communities = { all: defaultCommunities.all, ...(snap.val() || {}) };
    }
    async function checkAccountExists(email){
      const key = emailKey(email);
      const snap = await db.ref("emails/" + key).get();
      state.accountExists = snap.exists();
      return state.accountExists;
    }

    async function loadProfile(uid){
      const profileRef=db.ref("profiles/" + uid), userRef=db.ref("users/" + uid);
      const pSnap=await profileRef.get();
      if(!pSnap.exists()){
        const profile = {
          ...defaultProfile,
          displayName: state.displayName || state.email.split("@")[0],
          email: state.email,
          emailKey: emailKey(state.email),
          founder: state.email.toLowerCase()===FOUNDER_EMAIL.toLowerCase()
        };
        await profileRef.set(profile);
        await db.ref("emails/" + profile.emailKey).set(uid);
        state.profile = { ...defaultProfile, ...profile };
      } else {
        state.profile = { ...defaultProfile, ...pSnap.val() };
      }
      const uSnap=await userRef.get(); const uVal=uSnap.val()||{};
      if(!uSnap.exists()) await userRef.set({xp:0, level:1});
      state.profile.xp = uVal.xp || 0; state.profile.level = uVal.level || 1;
      state.profile.email = state.profile.email || state.email;
      state.profile.founder = String(state.profile.email || "").toLowerCase()===FOUNDER_EMAIL.toLowerCase() || !!state.profile.founder;
      const cc = countryByCode(state.profile.countryCode || "SA");
      state.profile.countryCode = cc.code; state.profile.countryFlag = cc.flag; state.profile.countryName = cc.name;
      state.founder = !!state.profile.founder;
    }

    async function addXP(amount){
      const uid=auth.currentUser && auth.currentUser.uid; if(!uid) return;
      const ref=db.ref("users/" + uid), snap=await ref.get(), data=snap.val()||{};
      const xp=(data.xp||0)+amount, level=getLevel(xp);
      await ref.update({xp,level}); state.profile.xp=xp; state.profile.level=level;
    }

    function subscribePostsForCommunity(communityId){
      const ref=db.ref("posts/" + communityId).limitToLast(100);
      const cb=snap=>{ const val=snap.val()||{}; state.posts[communityId]=Object.entries(val).map(([id,v])=>({id,communityId,...v})); if(state.user) renderMain(); };
      ref.on("value",cb); state.unsubs.push(()=>ref.off("value",cb));
    }
    function subscribeProfiles(){
      const ref=db.ref("profiles");
      const cb=snap=>{ state.profiles=snap.val()||{}; if(state.user) renderMain(); };
      ref.on("value",cb); state.unsubs.push(()=>ref.off("value",cb));
    }
    function subscribeStatus(){
      const ref=db.ref("status");
      const cb=snap=>{ state.statusMap=snap.val()||{}; if(state.user) renderMain(); };
      ref.on("value",cb); state.unsubs.push(()=>ref.off("value",cb));
    }
    function subscribeDMsForUser(uid){
      const ref=db.ref("dms");
      const cb=snap=>{
        const all=snap.val()||{}; state.threads={};
        Object.entries(all).forEach(([threadId,val])=>{ if(threadId.includes(uid)) state.threads[threadId]=val; });
        if(state.user) renderMain();
      };
      ref.on("value",cb); state.unsubs.push(()=>ref.off("value",cb));
    }
    async function subscribeAll(){
      clearUnsubs(); await loadCommunities();
      Object.keys(state.communities).filter(k=>k!=="all").forEach(subscribePostsForCommunity);
      subscribeProfiles(); subscribeStatus(); subscribeDMsForUser(state.user.uid);
    }

      ref.set({state:state.profile.presence||"online", last_changed:Date.now(), name: state.profile.displayName || state.email.split("@")[0] || "User"});

    async function sendCode(){
      state.email = ($("#email").value || "").trim().toLowerCase();
      if(state.accountMode==="signup") state.displayName = ($("#displayName").value || "").trim();
      if(!state.email) return setStatus("Enter your email");
      await checkAccountExists(state.email);
      if(state.accountMode==="signup" && !state.displayName) return setStatus("Enter a display name");
      setStatus("Sending code...");
      try{
        const r = await fetch(API + "/send-otp", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({email:state.email})});
        const d = await r.json().catch(()=>({}));
        if(!r.ok || !d.ok) return setStatus(d.error || "Failed to send code");
        state.otpSent = true; renderAuth();
        setStatus(state.accountExists ? "Code sent. Sign into your account." : "Code sent. Your profile will be ready after verification.", true);
      }catch(e){ setStatus("Error: " + e.message); }
    }

    async function verifyCode(){
      const code = ($("#code").value || "").trim();
      if(!state.email) return setStatus("Enter your email");
      if(!/^\d{6}$/.test(code)) return setStatus("Enter the 6-digit code");
      setStatus("Signing into Firebase...");
      try{
        const r = await fetch(API + "/verify-otp", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({email:state.email, code})});
        const d = await r.json().catch(()=>({}));
        if(!r.ok || !d.token) return setStatus(d.error || "Invalid or expired code");
        await auth.signInWithCustomToken(d.token);
        setStatus("Entered successfully", true);
      }catch(err){
        console.error("Firebase signIn error:", err);
        setStatus("Firebase error: " + (err.code || err.message || "unknown"));
      }
    }

    function allPosts(){ const arr=[]; Object.entries(state.posts).forEach(([communityId,list])=>{ (list||[]).forEach(p=>arr.push({...p,communityId}));}); return arr; }
    function topPosts(){
      let list = allPosts();
      if(state.currentCommunity !== "all") list = list.filter(p => p.communityId === state.currentCommunity);
      const blocked = state.profile.blockedUsers || {};
      list = list.filter(p => !blocked[p.uid]);
      return list.sort((a,b)=>{
        const scoreA=(a.likes||0)*5 + ((a.createdAt||0)/100000000000);
        const scoreB=(b.likes||0)*5 + ((b.createdAt||0)/100000000000);
        return scoreB-scoreA;
      });
    }
    function friendCandidates(){
      const blocked = state.profile.blockedUsers || {};
      return Object.entries(state.profiles)
        .filter(([uid,p]) => uid !== (state.user && state.user.uid) && !blocked[uid])
        .map(([uid,p])=>({uid,...p})).slice(0,20);
    }
    function threadIdFor(a,b){ return [a,b].sort().join("__"); }
    function selectedThreadMessages(){
      if(!state.user || !state.selectedDmUid) return [];
      const id=threadIdFor(state.user.uid, state.selectedDmUid);
      const thread=state.threads[id] || {}, messages=thread.messages || {};
      return Object.entries(messages).map(([id,v])=>({id,...v})).sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
    }

    function homeResults(){
      const q = state.searchHome.trim().toLowerCase();
      if(!q) return [];
      const communities = Object.entries(state.communities)
        .filter(([id,c]) => id !== "all" && (id.toLowerCase().includes(q) || String(c.name||"").toLowerCase().includes(q) || String(c.topic||"").toLowerCase().includes(q)))
        .map(([id,c])=>({type:"community", id, title:c.name, sub:c.topic || ""}));
      const blocked = state.profile.blockedUsers || {};
      const users = Object.entries(state.profiles)
        .filter(([uid,p]) => uid !== (state.user && state.user.uid) && !blocked[uid] && (
          String(p.displayName||"").toLowerCase().includes(q)
        ))
        .map(([uid,p])=>({type:"user", id:uid, title:p.displayName || "User", sub:p.mood || ""}));
      return [...communities, ...users].slice(0,8);
    }

    function baseResults(){
      const q = state.searchBase.trim().toLowerCase();
      const users = friendCandidates();
      if(!q) return users;
      return users.filter(u => String(u.displayName||"").toLowerCase().includes(q) || String(u.mood||"").toLowerCase().includes(q) || String(u.playingGame||"").toLowerCase().includes(q));
    }

    async function createPost(){
      const box=$("#composer"); if(!box || !state.user) return;
      const text=box.value.trim();
      const postLink = ($("#postLinkInput")?.value || "").trim();
      const postImage = state.draftPostImage || "";
      if(!text && !postLink && !postImage) return;
      const targetCommunity = state.currentCommunity === "all" ? "general" : state.currentCommunity;
      const now=Date.now();
      if(now - state.lastPostAt < 1800){ toast("Slow down", "Wait a moment before posting again"); return; }
      state.lastPostAt=now;
      await db.ref("posts/" + targetCommunity).push({
        uid: state.user.uid, email: state.email,
        name: state.profile.displayName || state.email.split("@")[0],
        avatar: state.profile.avatar || "", text:text.slice(0,700), image:postImage, link:postLink, likes:0, likedBy:{}, createdAt:now
      });
      box.value="";
      if($("#postLinkInput")) $("#postLinkInput").value="";
      resetDraftMedia();
      renderMain();
      await addXP(5); toast("Posted", "Your update is live");

            </select>
            <input class="input" id="profileMusic" placeholder="Spotify / MP3 / music link" value="${esc(state.profile.musicUrl||"")}">
            <textarea class="textarea" id="profileMySpace" placeholder="My Space text">${esc(state.profile.mySpace||"")}</textarea>

            <div class="file-row">
              <label class="file-btn">Profile Picture<input type="file" id="avatarFile" accept="image/*"></label>
              <label class="file-btn">Cover<input type="file" id="coverFile" accept="image/*"></label>
            </div>

            <div class="section-title">SHOWCASE IMAGES</div>
            <div class="file-row">
              <label class="file-btn">Showcase 1<input type="file" id="showcase1File" accept="image/*"></label>
              <label class="file-btn">Showcase 2<input type="file" id="showcase2File" accept="image/*"></label>
              <label class="file-btn">Showcase 3<input type="file" id="showcase3File" accept="image/*"></label>
            </div>

            <div class="row" style="margin-top:10px">
              <button class="btn primary" id="saveProfileBtn">Save</button>
            </div>
          </div>
        </div>
      `;

      $$("[data-page]").forEach(btn=>btn.onclick=()=>{ state.currentPage=btn.dataset.page; state.memberProfileMode=false; state.settingsOpen=false; state.aiOpen=false; renderMain(); });
      $$(".community-item[data-community]").forEach(card=>card.onclick=()=>{ state.currentCommunity=card.dataset.community; state.currentPage="home"; state.sidebarOpen=false; renderMain(); });
      $$("[data-like-post]").forEach(btn=>btn.onclick=()=>likePost(btn.dataset.likeCommunity, btn.dataset.likePost));
      $$("[data-open-member]").forEach(el=>el.onclick=()=>{ state.viewingProfileUid=el.dataset.openMember; state.currentPage="memberProfile"; renderMain(); });

      $$("[data-result-type]").forEach(el=>el.onclick=()=>{
        if(el.dataset.resultType==="community"){ state.currentCommunity=el.dataset.resultId; state.currentPage="home"; state.searchHome=""; }
        else { state.viewingProfileUid=el.dataset.resultId; state.currentPage="memberProfile"; state.searchHome=""; }
        renderMain();
      });

      $("#openSidebarBtn") && ($("#openSidebarBtn").onclick=()=>{ state.sidebarOpen=true; renderMain(); });
      $("#closeSidebarBtn") && ($("#closeSidebarBtn").onclick=()=>{ state.sidebarOpen=false; renderMain(); });
      $("#sidebarBackdrop") && ($("#sidebarBackdrop").onclick=()=>{ state.sidebarOpen=false; renderMain(); });

      $("#openSettingsBtn") && ($("#openSettingsBtn").onclick=()=>{ state.settingsOpen=true; renderMain(); });
      $("#closeSettingsBtn") && ($("#closeSettingsBtn").onclick=()=>{ state.settingsOpen=false; renderMain(); });
      $("#settingsDrawer") && ($("#settingsDrawer").onclick=e=>{ if(e.target.id==="settingsDrawer"){ state.settingsOpen=false; renderMain(); } });

      $("#backToBaseBtn") && ($("#backToBaseBtn").onclick=()=>{ state.currentPage="base"; state.viewingProfileUid=""; renderMain(); });

      $("#openAiBtn") && ($("#openAiBtn").onclick=()=>{ state.aiOpen=true; renderMain(); });
      $("#closeAiBtn") && ($("#closeAiBtn").onclick=()=>{ state.aiOpen=false; renderMain(); });
      $("#aiDrawer") && ($("#aiDrawer").onclick=e=>{ if(e.target.id==="aiDrawer"){ state.aiOpen=false; renderMain(); } });

      $("#openCreateCommunityBtn") && ($("#openCreateCommunityBtn").onclick=()=>{ state.createCommunityOpen=true; renderMain(); });
      $("#closeCreateCommunityBtn") && ($("#closeCreateCommunityBtn").onclick=()=>{ state.createCommunityOpen=false; renderMain(); });
      $("#createCommunityDrawer") && ($("#createCommunityDrawer").onclick=e=>{ if(e.target.id==="createCommunityDrawer"){ state.createCommunityOpen=false; renderMain(); } });
      $("#createCommunityBtn") && ($("#createCommunityBtn").onclick=createCommunity);

      $$("[data-ai]").forEach(btn=>btn.onclick=()=>{
        const answer=$("#aiAnswerCard");
        const map={
          profile:"Use Edit Profile to change mood, music, cover, profile picture, and the 3 Showcase slots.",
          base:"Base is your private zone. Pick a user, open the thread, and send direct messages there. You can block from Base too.",
          home:"Home shows top liked posts from all communities. Open the sidebar to switch to one specific community feed.",
          founder:"Your founder email gets detected automatically and unlocks Founder mode and community creation."
        };
        if(answer) answer.innerHTML=`<div class="card-title">Response</div><div class="card-sub">${esc(map[btn.dataset.ai] || "Ready.")}</div>`;
      });

      $("#noticeBtn") && ($("#noticeBtn").onclick=()=>{
        if(state.profile.notificationsEnabled) toast("Notifications", "Your white EchoNode bell is active.");
      });

      $("#sendPostBtn") && ($("#sendPostBtn").onclick=createPost);
      $("#composer") && ($("#composer").addEventListener("keydown", e=>{ if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); createPost(); } }));
      $("#postLinkInput") && ($("#postLinkInput").addEventListener("input", e=>{ state.draftPostLink=e.target.value; }));
      const postImageInput = $("#postImageInput");
      if(postImageInput){
        postImageInput.onchange = async e => {
          const f = e.target.files && e.target.files[0];
          if(!f) return;
          state.draftPostImage = await fileToDataUrl(f);
          renderMain();
          toast("Image ready", "Your post image is attached");
        };
      }
      $("#sendDmBtn") && ($("#sendDmBtn").onclick=sendDM);
      $("#dmInput") && ($("#dmInput").addEventListener("keydown", e=>{ if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); sendDM(); } }));
      $("#homeSearch") && ($("#homeSearch").addEventListener("input", e=>{ state.searchHome=e.target.value; renderMain(); }));
      $("#userSearch") && ($("#userSearch").addEventListener("input", e=>{ state.searchBase=e.target.value; renderMain(); }));

      $("#openProfileSettingsBtn") && ($("#openProfileSettingsBtn").onclick=()=>$("#editorModal").classList.add("open"));
      $("#openProfileSettingsBtn2") && ($("#openProfileSettingsBtn2").onclick=()=>$("#editorModal").classList.add("open"));
      $("#backToBaseBtn") && ($("#backToBaseBtn").onclick=()=>{ state.memberProfileMode=false; state.currentPage="base"; renderMain(); });
      $("#memberProfileBlockBtn") && ($("#memberProfileBlockBtn").onclick=()=>{ state.selectedDmUid=state.memberCardUid; blockSelectedUser(); });
      $("#closeEditorBtn") && ($("#closeEditorBtn").onclick=()=>$("#editorModal").classList.remove("open"));
      $("#editorModal") && ($("#editorModal").onclick=e=>{ if(e.target.id==="editorModal") $("#editorModal").classList.remove("open"); });
      $("#saveProfileBtn") && ($("#saveProfileBtn").onclick=saveProfile);

      $("#saveSettingsBtn") && ($("#saveSettingsBtn").onclick=saveSettings);
      $("#toggleBirthday") && ($("#toggleBirthday").onclick=()=>toggleProfileFlag("showBirthday"));
      $("#toggleCountry") && ($("#toggleCountry").onclick=()=>toggleProfileFlag("showCountry"));
      $("#toggleNotifications") && ($("#toggleNotifications").onclick=()=>toggleProfileFlag("notificationsEnabled"));
      $$("[data-unblock]").forEach(btn=>btn.onclick=()=>unblockUser(btn.dataset.unblock));
      $("#blockSelectedBtn") && ($("#blockSelectedBtn").onclick=blockSelectedUser);

      $("#logoutBtn") && ($("#logoutBtn").onclick=async ()=>{ await auth.signOut(); state.currentPage="home"; state.settingsOpen=false; });

      const bindImage=(id,key)=>{
        const input=$(id); if(!input) return;
        input.onchange=async e=>{ const f=e.target.files && e.target.files[0]; if(!f) return; state.profile[key]=await fileToDataUrl(f); toast("Ready", key + " saved locally. Press Save."); };
      };
      bindImage("#avatarFile","avatar");
      bindImage("#coverFile","cover");
      bindImage("#showcase1File","showcase1");
      bindImage("#showcase2File","showcase2");
      bindImage("#showcase3File","showcase3");
    }

    async function saveProfile(){
      const next = {
        displayName: ($("#profileName").value || "").trim() || state.profile.displayName,
        mood: ($("#profileMood").value || "").trim() || state.profile.mood,
        mySpace: ($("#profileMySpace").value || "").trim() || state.profile.mySpace,
        musicUrl: ($("#profileMusic").value || "").trim(),
        presence: $("#profilePresence").value || state.profile.presence,
        avatar: state.profile.avatar || "", cover: state.profile.cover || "",
        showcase1: state.profile.showcase1 || "", showcase2: state.profile.showcase2 || "", showcase3: state.profile.showcase3 || "",
        email: state.profile.email || state.email, emailKey: emailKey(state.profile.email || state.email),
        founder: state.founder,
        birthday: state.profile.birthday || "",
        gender: state.profile.gender || "",
        friendsVisibility: state.profile.friendsVisibility || "public",
        countryCode: state.profile.countryCode || "SA",
        countryFlag: state.profile.countryFlag || "🇸🇦",
        countryName: state.profile.countryName || "Saudi Arabia",
        showBirthday: !!state.profile.showBirthday,
        showCountry: !!state.profile.showCountry,
        notificationsEnabled: !!state.profile.notificationsEnabled,
        securityKey: state.profile.securityKey || "",
        blockedUsers: state.profile.blockedUsers || {}
      };
      state.profile = { ...state.profile, ...next };
      await db.ref("profiles/" + state.user.uid).update(next);
      await db.ref("emails/" + next.emailKey).set(state.user.uid);
      await setPresence(next.presence);
      $("#editorModal").classList.remove("open");
      renderMain(); toast("Saved", "Profile updated");
    }

    auth.onAuthStateChanged(async user=>{
      if(!user){ state.user=null; state.founder=false; clearUnsubs(); renderAuth(); return; }
      state.user=user; state.email=user.email || state.email;
      await loadProfile(user.uid); await subscribeAll(); bindPresence(); renderMain();
    });

    renderAuth();
  </script>
</body>
</html>
